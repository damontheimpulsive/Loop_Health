.job_template: &gradle_cache
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .gradle/caches
      - .gradle/wrapper

.job_template: &gradle_home_setup
  before_script:
    - export GRADLE_USER_HOME=`pwd`/.gradle


build:
  <<: *gradle_home_setup
  <<: *gradle_cache
  stage: build
  variables:
    FF_NETWORK_PER_BUILD: "true"
    APP_ENVIRONMENT: test
    APP_PORT: 4000
  script:
    - APP_ENVIRONMENT=test ./gradlew build
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/TEST-*.xml
    paths:
      - build/reports/tests/
      - build/reports/jacoco/
  tags:
    - gopay
    - service

pages:
  stage: build
  variables:
    npm_config_cache: '.npm'
  cache:
    paths:
      - doc/.npm
      - doc/node_modules
    key: "$CI_COMMIT_REF_SLUG-docs"
  image:
    name: node:10-alpine
  before_script:
    - cd doc
    - npm install
  script:
    - 'npm run build'
  after_script:
    - 'mv doc/dist public'
  artifacts:
    paths:
      - 'public'
  tags:
    - gopaysh
  allow_failure: true

artefact-build:
  image: gtf-system-registry.ap-southeast-5.cr.aliyuncs.com/gopay-systems/cx-gopay-packager:latest
  services:
    - name: gtf-system-registry.ap-southeast-5.cr.aliyuncs.com/gopay-systems/docker:28.1.1-dind
      alias: docker
      variables:
        HEALTHCHECK_TCP_PORT: "2375"
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKERFILE_PATH: ./_deployments/docker/Dockerfile
    DOCKER_CONTEXT_PATH: .
  stage: artefact-build
  script:
    - packager
  tags:
    - gopaysh

deploy:
  image: gtf-system-registry.ap-southeast-5.cr.aliyuncs.com/gopay-systems/gopaysh:latest
  stage: deploy
  script:
    - gopaysh deployment create pacman-bot-app-gsh
      --cluster go-gp-eks-01
      --env staging-secondary
      --image ${GOPAYSH_IMAGE}
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
  tags:
    - gopaysh
